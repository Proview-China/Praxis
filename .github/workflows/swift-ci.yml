name: Swift CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
      - "codex-*"
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Swift Package
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift Version
        run: swift --version

      - name: Run Unit And Architecture Tests
        run: swift test

      - name: Run RuntimeKit Example
        run: swift run PraxisRuntimeKitRunExample

      - name: Run CMP TAP Example
        run: swift run PraxisRuntimeKitCmpTapExample

      - name: Run Capabilities Example
        run: swift run PraxisRuntimeKitCapabilitiesExample

      - name: Run Governed Execution Example
        run: swift run PraxisRuntimeKitGovernedExecutionExample

      - name: Run Search Example
        run: swift run PraxisRuntimeKitSearchExample

      - name: Run Durable Runtime Example
        run: swift run PraxisRuntimeKitDurableRuntimeExample

      - name: Run FFI Embedding Example
        run: swift run PraxisFFIEmbeddingExample

      - name: Run Apple Host Embedding Example
        run: swift run PraxisAppleHostEmbeddingExample

      - name: Run Export Baseline Example
        run: swift run PraxisExportBaselineExample --iterations 5 --format json

      - name: Run Search Smoke
        run: swift run PraxisRuntimeKitSmoke --suite search

      - name: Run CMP TAP Smoke
        run: swift run PraxisRuntimeKitSmoke --suite cmp-tap

      - name: Run Recovery Smoke
        run: swift run PraxisRuntimeKitSmoke --suite recovery

      - name: Run Provisioning Smoke
        run: swift run PraxisRuntimeKitSmoke --suite provisioning

      - name: Run Capabilities Smoke
        run: swift run PraxisRuntimeKitSmoke --suite capabilities

      - name: Run Code Smoke
        run: swift run PraxisRuntimeKitSmoke --suite code

      - name: Run Code Sandbox Smoke
        run: swift run PraxisRuntimeKitSmoke --suite code-sandbox

      - name: Run Code Patch Smoke
        run: swift run PraxisRuntimeKitSmoke --suite code-patch

      - name: Run Shell Smoke
        run: swift run PraxisRuntimeKitSmoke --suite shell

      - name: Run Shell Approval Smoke
        run: swift run PraxisRuntimeKitSmoke --suite shell-approval

      - name: Build Native Demo Host
        run: swift build --product PraxisDemoHostApp
